name: Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run tests
        run: nix develop -c cargo test --all-features -- --test-threads=1

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Docker image
        run: nix build .#docker-image

      - name: Load image
        run: docker load < result

      - name: Smoke test - verify Chromium starts and can load a page
        run: |
          mkdir -p /tmp/smoke-logs
          touch /tmp/smoke-hosts

          docker run -d --name smoke-test \
            --read-only \
            --tmpfs /tmp:size=128M,mode=1777 \
            --tmpfs /dev/shm:size=64M,mode=1777 \
            -p 127.0.0.1:63004:63004 \
            -v /tmp/smoke-logs:/var/log/packet-browser \
            -v /tmp/smoke-hosts:/etc/hosts \
            --cap-drop ALL \
            -e DEBUG_MODE=true \
            -e BLOCKLIST_ENABLED=false \
            -e PORTAL_URL=https://example.com \
            docker-packet-browser:latest

          echo "Waiting for docker-packet-browser to start listening..."
          timeout 30 bash -c 'until nc -z 127.0.0.1 63004 2>/dev/null; do sleep 1; done'
          echo "Service is up"

          # Simulate a user login to trigger browser initialization.
          { sleep 1; echo "W1TEST"; sleep 1; echo "AGREE"; sleep 180; } \
            | nc 127.0.0.1 63004 >/dev/null 2>&1 &
          NC_PID=$!

          echo "Step 1/2: Waiting for Chrome DevTools connection (up to 60s)..."
          CONNECTED=0
          for i in $(seq 1 60); do
            if docker logs smoke-test 2>&1 | grep -q '\[BROWSER\] Connected to Chrome DevTools'; then
              echo "  Chrome connected after ${i}s"
              CONNECTED=1
              break
            fi
            sleep 1
          done

          if [ $CONNECTED -eq 0 ]; then
            echo "--- Container logs ---"
            docker logs smoke-test 2>&1
            kill $NC_PID 2>/dev/null || true
            docker stop smoke-test 2>/dev/null || true
            docker rm smoke-test 2>/dev/null || true
            echo "FAIL: Chrome did not connect"
            exit 1
          fi

          echo "Step 2/2: Waiting for page load (up to 60s)..."
          RESULT=1
          for i in $(seq 1 60); do
            if docker logs smoke-test 2>&1 | grep -q '\[BROWSER\] Page loaded:'; then
              echo "PASS: Page loaded after ${i}s"
              RESULT=0
              break
            fi
            sleep 1
          done

          echo "--- Container logs ---"
          docker logs smoke-test 2>&1

          kill $NC_PID 2>/dev/null || true
          docker stop smoke-test 2>/dev/null || true
          docker rm smoke-test 2>/dev/null || true
          exit $RESULT

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Tag and push image
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            docker tag docker-packet-browser:latest "$tag"
            docker push "$tag"
          done
